<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - Login</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f0f2f5;
}

.facebook-text {
    color: #1877f2;
    font-size: 60px;
    font-weight: 700;
}

.login-card {
    border: none;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.btn-facebook {
    background-color: #1877f2;
    color: white;
    font-weight: 600;
}

.btn-facebook:hover {
    background-color: #166fe5;
}

.create-btn {
    background-color: #42b72a;
    color: white;
    font-weight: 600;
}

.create-btn:hover {
    background-color: #36a420;
}
</style>
</head>
<body>

<div class="container">
<div class="row align-items-center vh-100">

    <!-- Left Side -->
    <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
        <h1 class="facebook-text">facebook</h1>
        <p class="fs-4">
            Connect with friends and the world around you on Facebook.
        </p>
    </div>

    <!-- Right Side -->
    <div class="col-lg-6">
        <div class="card login-card p-4">
            <form>
                <input type="text" class="form-control mb-3" placeholder="Email or Phone Number">
                <input type="password" class="form-control mb-3" placeholder="Password">

                <button class="btn btn-facebook w-100 mb-3">Log In</button>

                <div class="text-center mb-3">
                    <a href="#" class="text-decoration-none">Forgot Password?</a>
                </div>

                <hr>

                <div class="text-center">
                    <button class="btn create-btn px-4">Create New Account</button>
                </div>
            </form>
        </div>

        <p class="text-center mt-3">
            <strong>Create a Page</strong> for a celebrity, brand or business.
        </p>
    </div>

</div>
</div>

</body>
</html>
