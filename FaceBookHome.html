<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook - Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f0f2f5;
}

.navbar-custom {
    background-color: #1877f2;
}

.sidebar, .rightbar {
    background: white;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.post-card {
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.story-box {
    height: 150px;
    border-radius: 15px;
    background: linear-gradient(135deg, #1877f2, #42a5f5);
    color: white;
    display: flex;
    align-items: flex-end;
    padding: 10px;
    font-weight: 600;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
<div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">facebook</a>
    <form class="d-flex w-50">
        <input class="form-control" type="search" placeholder="Search Facebook">
    </form>
</div>
</nav>

<div class="container mt-4">
<div class="row">

    <!-- Left Sidebar -->
    <div class="col-lg-3 d-none d-lg-block">
        <div class="sidebar">
            <p><strong>John Walker</strong></p>
            <hr>
            <p>Friends</p>
            <p>Groups</p>
            <p>Marketplace</p>
            <p>Watch</p>
        </div>
    </div>

    <!-- Middle Content -->
    <div class="col-lg-6">

        <!-- Stories -->
        <div class="row mb-3">
            <div class="col-4">
                <div class="story-box">Your Story</div>
            </div>
            <div class="col-4">
                <div class="story-box">Ali</div>
            </div>
            <div class="col-4">
                <div class="story-box">Sara</div>
            </div>
        </div>

        <!-- Create Post -->
        <div class="card post-card p-3 mb-3">
            <input type="text" class="form-control mb-2" placeholder="What's on your mind, John?">
            <div class="d-flex justify-content-between">
                <button class="btn btn-light">Live Video</button>
                <button class="btn btn-light">Photo</button>
                <button class="btn btn-light">Feeling</button>
            </div>
        </div>

        <!-- Sample Post -->
        <div class="card post-card p-3 mb-3">
            <h6 class="fw-bold">Ali Khan</h6>
            <p>Just finished my web development project 🔥</p>
            <hr>
            <div class="d-flex justify-content-around">
                <button class="btn btn-light w-100 me-2">Like</button>
                <button class="btn btn-light w-100 me-2">Comment</button>
                <button class="btn btn-light w-100">Share</button>
            </div>
        </div>

    </div>

    <!-- Right Sidebar -->
    <div class="col-lg-3 d-none d-lg-block">
        <div class="rightbar">
            <h6>Contacts</h6>
            <hr>
            <p>Ahmed</p>
            <p>Fatima</p>
            <p>Usman</p>
        </div>
    </div>

</div>
</div>

</body>
</html>
